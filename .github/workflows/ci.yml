name: CI

on:
  pull_request:
    branches: [ main, release-0.1.z ]
  push:
    branches: [ main, release-0.1.z ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # CHANGE THIS BLOCK TO MATCH YOUR STACK
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run tests
        run: |
          PYTHONPATH=src python -m pytest

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt bandit pip-audit

      - name: Run bandit
        run: |
          python -m bandit -r src

      - name: Run pip-audit
        run: |
          python -m pip_audit

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt mypy ruff

      - name: Run ruff format check
        run: |
          python -m ruff format --check .

      - name: Run ruff lint
        run: |
          python -m ruff check .

      - name: Run mypy
        run: |
          python -m mypy src
